version: 2
updates:
  # Backend - Maven dependencies
  - package-ecosystem: "maven"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "backend"
    commit-message:
      prefix: "chore(deps)"

  # Frontend - npm dependencies
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "frontend"
    commit-message:
      prefix: "chore(deps)"
    # ESLint 10 is blocked upstream: eslint-plugin-react-hooks@7
    # does not yet accept eslint@^10.0.0. Dependabot keeps reopening
    # the same unmergeable bump every week, so we ignore the major
    # version until the plugin ecosystem catches up.
    # TODO: remove this ignore block once eslint-plugin-react-hooks
    # publishes a release that accepts eslint@^10, then follow up
    # with a manual eslint-ecosystem upgrade PR.
    ignore:
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@eslint/js"
        update-types: ["version-update:semver-major"]
    groups:
      react:
        patterns:
          - "react*"
          - "@types/react*"
      testing:
        patterns:
          - "@testing-library/*"
          - "vitest*"
          - "@vitest/*"
      # All ESLint/TypeScript/Vite packages are bumped together so
       # peer-dependency conflicts (e.g. @eslint/js vs eslint major
       # version drift) can never land as separate Dependabot PRs.
      dev-tools:
        patterns:
          - "eslint"
          - "eslint-*"
          - "@eslint/*"
          - "@eslint-community/*"
          - "typescript"
          - "typescript-eslint"
          - "@typescript-eslint/*"
          - "vite"
          - "@vitejs/*"

  # E2E - Playwright
  - package-ecosystem: "npm"
    directory: "/e2e"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "e2e"
    commit-message:
      prefix: "chore(deps)"
    groups:
      playwright:
        patterns:
          - "@playwright/*"
          - "playwright*"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(ci)"
