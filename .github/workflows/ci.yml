name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

permissions:
  contents: read
  issues: write

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '20'

jobs:
  # ============================================
  # Backend: Build, Test, Coverage
  # ============================================
  backend:
    name: Backend (Java/Kotlin)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Test
        run: mvn clean verify -B

      - name: Generate Coverage Report
        run: mvn jacoco:report -B

      - name: Check Coverage Threshold (80%)
        run: |
          COVERAGE=$(grep -oP 'Total.*?(\d+)%' target/site/jacoco/index.html | grep -oP '\d+' | head -1 || echo "0")
          echo "Coverage: ${COVERAGE}%"
          if [ "$COVERAGE" -lt 80 ]; then
            echo "::warning::Coverage ${COVERAGE}% is below 80% threshold"
          fi

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage-report
          path: backend/target/site/jacoco/
          retention-days: 7

  # ============================================
  # Frontend: Lint, Type-check, Build, Test
  # ============================================
  frontend:
    name: Frontend (React/TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type Check
        run: npm run type-check

      - name: Build
        run: npm run build

      - name: Run Tests
        run: npm run test -- --coverage --reporter=verbose
        continue-on-error: true

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage-report
          path: frontend/coverage/
          retention-days: 7

  # ============================================
  # Summary Job
  # ============================================
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: always()

    steps:
      - name: Check Results
        id: check
        run: |
          if [ "${{ needs.backend.result }}" == "failure" ] || [ "${{ needs.frontend.result }}" == "failure" ]; then
            echo "::error::CI failed. Check backend and frontend jobs for details."
            echo "failed=true" >> $GITHUB_OUTPUT
            exit 1
          fi
          echo "All CI checks passed!"

      - name: Create Issue on Failure
        if: failure()
        uses: actions/github-script@v8
        with:
          script: |
            const title = `❌ CI Failed: ${context.workflow}`;
            const body = `## CI Build Failed

            **Branch:** \`${{ github.ref_name }}\`
            **Commit:** \`${{ github.sha }}\`
            **Triggered by:** @${{ github.actor }}

            ### Job Results
            | Job | Status |
            |-----|--------|
            | Backend | ${{ needs.backend.result }} |
            | Frontend | ${{ needs.frontend.result }} |

            ### Links
            - [View Workflow Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            - [View Commit](https://github.com/${{ github.repository }}/commit/${{ github.sha }})

            ---
            *This issue was automatically created by GitHub Actions*`;

            // Check if similar issue already exists
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'ci-failure'
            });

            const existingIssue = issues.data.find(issue =>
              issue.title.includes('CI Failed') &&
              issue.body.includes('${{ github.ref_name }}')
            );

            if (existingIssue) {
              // Add comment to existing issue
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: `🔄 **CI failed again**\n\nCommit: \`${{ github.sha }}\`\n[View Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`
              });
              console.log(`Added comment to existing issue #${existingIssue.number}`);
            } else {
              // Create new issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['bug', 'ci-failure']
              });
              console.log('Created new issue');
            }
