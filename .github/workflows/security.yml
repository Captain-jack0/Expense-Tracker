name: Security Scan

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]
  schedule:
    # Run weekly on Monday at 9:00 AM UTC
    - cron: '0 9 * * 1'

permissions:
  contents: read
  security-events: write
  issues: write

jobs:
  # ============================================
  # Dependency Vulnerability Scan
  # ============================================
  dependency-scan:
    name: Dependency Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Backend - Maven dependency check
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Backend - OWASP Dependency Check
        working-directory: ./backend
        run: |
          mvn org.owasp:dependency-check-maven:check -B || true
        continue-on-error: true

      - name: Upload Backend Security Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-dependency-check
          path: backend/target/dependency-check-report.html
          retention-days: 30

      # Frontend - npm audit
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Frontend - npm audit
        working-directory: ./frontend
        run: |
          npm ci
          npm audit --audit-level=high || echo "::warning::High severity vulnerabilities found"
        continue-on-error: true

  # ============================================
  # CodeQL Analysis
  # ============================================
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ['java-kotlin', 'javascript-typescript']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Set up JDK 17
        if: matrix.language == 'java-kotlin'
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Java/Kotlin
        if: matrix.language == 'java-kotlin'
        working-directory: ./backend
        run: mvn compile -B -DskipTests

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  # ============================================
  # Secret Scanning
  # ============================================
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha || 'HEAD~1' }}
          head: HEAD
          extra_args: --only-verified
        continue-on-error: true

  # ============================================
  # Security Summary
  # ============================================
  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [dependency-scan, codeql, secret-scan]
    if: always()

    steps:
      - name: Security Check Results
        id: check
        run: |
          echo "## Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Scan | ${{ needs.dependency-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| CodeQL | ${{ needs.codeql.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Secret Scan | ${{ needs.secret-scan.result }} |" >> $GITHUB_STEP_SUMMARY

          # Check if any job failed
          if [ "${{ needs.dependency-scan.result }}" == "failure" ] || \
             [ "${{ needs.codeql.result }}" == "failure" ] || \
             [ "${{ needs.secret-scan.result }}" == "failure" ]; then
            echo "failed=true" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Create Issue on Security Failure
        if: failure()
        uses: actions/github-script@v8
        with:
          script: |
            const title = `🔒 Security Scan Failed: ${context.workflow}`;
            const body = `## Security Scan Failed

            **Branch:** \`${{ github.ref_name }}\`
            **Commit:** \`${{ github.sha }}\`
            **Triggered by:** @${{ github.actor }}

            ### Scan Results
            | Check | Status |
            |-------|--------|
            | Dependency Scan | ${{ needs.dependency-scan.result }} |
            | CodeQL Analysis | ${{ needs.codeql.result }} |
            | Secret Scan | ${{ needs.secret-scan.result }} |

            ### Action Required
            - Review the failed security checks
            - Fix any vulnerabilities found
            - Re-run the security scan

            ### Links
            - [View Workflow Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            - [View Commit](https://github.com/${{ github.repository }}/commit/${{ github.sha }})

            ---
            *This issue was automatically created by GitHub Actions*`;

            // Check if similar issue already exists
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'security'
            });

            const existingIssue = issues.data.find(issue =>
              issue.title.includes('Security Scan Failed') &&
              issue.body.includes('${{ github.ref_name }}')
            );

            if (existingIssue) {
              // Add comment to existing issue
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: `🔄 **Security scan failed again**\n\nCommit: \`${{ github.sha }}\`\n\n| Check | Status |\n|-------|--------|\n| Dependency Scan | ${{ needs.dependency-scan.result }} |\n| CodeQL | ${{ needs.codeql.result }} |\n| Secret Scan | ${{ needs.secret-scan.result }} |\n\n[View Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`
              });
              console.log(`Added comment to existing issue #${existingIssue.number}`);
            } else {
              // Create new issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['security', 'high-priority']
              });
              console.log('Created new issue');
            }
