name: Security Scan

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]
  schedule:
    # Run weekly on Monday at 9:00 AM UTC
    - cron: '0 9 * * 1'

permissions:
  contents: read
  security-events: write
  issues: write
  pull-requests: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================
  # Detect what changed so docs-only PRs skip
  # expensive security scans entirely.
  # ============================================
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            code:
              - 'backend/**'
              - 'frontend/**'
              - '.github/workflows/security.yml'

  # ============================================
  # Dependency Vulnerability Scan
  # ============================================
  dependency-scan:
    name: Dependency Scan
    needs: changes
    if: ${{ github.event_name != 'pull_request' || needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache OWASP NVD database
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: owasp-nvd-${{ runner.os }}-${{ hashFiles('backend/pom.xml') }}
          restore-keys: |
            owasp-nvd-${{ runner.os }}-

      - name: Backend - OWASP Dependency Check
        if: ${{ github.event_name != 'pull_request' || needs.changes.outputs.backend == 'true' }}
        working-directory: ./backend
        run: mvn -B -ntp org.owasp:dependency-check-maven:check

      - name: Upload Backend Security Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-dependency-check
          path: backend/target/dependency-check-report.html
          retention-days: 30

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend - npm audit
        if: ${{ github.event_name != 'pull_request' || needs.changes.outputs.frontend == 'true' }}
        working-directory: ./frontend
        run: |
          npm ci
          npm audit --audit-level=high

  # ============================================
  # CodeQL Analysis (Java + JS/TS)
  # ============================================
  codeql:
    name: CodeQL Analysis
    needs: changes
    if: ${{ github.event_name != 'pull_request' || needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ['java', 'javascript-typescript']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Set up JDK 17
        if: matrix.language == 'java'
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build Java
        if: matrix.language == 'java'
        working-directory: ./backend
        run: mvn -B -ntp compile -DskipTests

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  # ============================================
  # Secret Scanning
  # ============================================
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets (PR diff)
        if: github.event_name == 'pull_request'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --only-verified

      - name: Scan for secrets (full history)
        if: github.event_name != 'pull_request'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified

  # ============================================
  # Security Summary
  # ============================================
  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [dependency-scan, codeql, secret-scan]
    if: always()

    steps:
      - name: Security Check Results
        id: check
        run: |
          echo "## Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Scan | ${{ needs.dependency-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| CodeQL | ${{ needs.codeql.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Secret Scan | ${{ needs.secret-scan.result }} |" >> $GITHUB_STEP_SUMMARY

          # Treat "skipped" as success (path filter said irrelevant).
          if [[ "${{ needs.dependency-scan.result }}" == "failure" || \
                "${{ needs.codeql.result }}" == "failure" || \
                "${{ needs.secret-scan.result }}" == "failure" ]]; then
            exit 1
          fi

      - name: Create Issue on Security Failure
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const title = `Security Scan Failed: ${context.workflow}`;
            const body = `## Security Scan Failed

            **Branch:** \`${{ github.ref_name }}\`
            **Commit:** \`${{ github.sha }}\`
            **Triggered by:** @${{ github.actor }}

            ### Scan Results
            | Check | Status |
            |-------|--------|
            | Dependency Scan | ${{ needs.dependency-scan.result }} |
            | CodeQL Analysis | ${{ needs.codeql.result }} |
            | Secret Scan | ${{ needs.secret-scan.result }} |

            ### Action Required
            - Review the failed security checks
            - Fix any vulnerabilities found
            - Re-run the security scan

            ### Links
            - [View Workflow Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            - [View Commit](https://github.com/${{ github.repository }}/commit/${{ github.sha }})

            ---
            *This issue was automatically created by GitHub Actions*`;

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'security'
            });

            const existingIssue = issues.data.find(issue =>
              issue.title.includes('Security Scan Failed') &&
              issue.body.includes('${{ github.ref_name }}')
            );

            if (existingIssue) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: `Security scan failed again\n\nCommit: \`${{ github.sha }}\`\n\n| Check | Status |\n|-------|--------|\n| Dependency Scan | ${{ needs.dependency-scan.result }} |\n| CodeQL | ${{ needs.codeql.result }} |\n| Secret Scan | ${{ needs.secret-scan.result }} |\n\n[View Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`
              });
              console.log(`Added comment to existing issue #${existingIssue.number}`);
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['security', 'high-priority']
              });
              console.log('Created new issue');
            }
